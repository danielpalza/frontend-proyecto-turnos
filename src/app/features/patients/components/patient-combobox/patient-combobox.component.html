<div class="position-relative w-100" data-testid="patient-combobox">
  <!-- Input principal -->
  <input
    type="text"
    class="form-control"
    placeholder="Seleccione un paciente o escriba uno nuevo…"
    [(ngModel)]="value"
    (ngModelChange)="updateValue($event)"
    (focus)="isOpen = true"
    data-testid="patient-combobox-input"
  />

  <!-- Dropdown -->
  <div
    class="dropdown-menu show w-100 mt-1"
    *ngIf="isOpen"
    style="max-height: 250px; overflow-y: auto;"
    data-testid="patient-combobox-dropdown"
  >
    <!-- Si no hay pacientes -->
    <div *ngIf="filteredPatients.length === 0" class="dropdown-item text-muted">
      Presione Enter para usar "{{ value }}"
    </div>

    <!-- Lista filtrada -->
    <button
      *ngFor="let patient of filteredPatients"
      type="button"
      class="dropdown-item d-flex justify-content-between align-items-center"
      (click)="choosePatient(patient)"
      [attr.data-testid]="'patient-combobox-item-' + patient.dni"
    >
      <div class="d-flex flex-column">
        <strong>{{ fullName(patient.nombre, patient.apellido) }}</strong>
        <small class="text-muted">DNI: {{ patient.dni }}</small>
      </div>

      <!-- Check -->
      <i *ngIf="fullName(patient.nombre, patient.apellido) === value" class="bi bi-check-lg"></i>
    </button>
  </div>
</div>
