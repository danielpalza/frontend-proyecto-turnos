<div id="odontograma-print" class="card shadow-sm" data-testid="odontogram-form-panel">
  <div class="card-body">
    <div class="teeth-section">
      <section>
        <p class="section-title text-primary"></p>
        <div class="teeth-container">
          <div class="teeth-group">
            <div *ngFor="let tooth of permanentTeeth.topRight" class="tooth-item" [attr.data-testid]="'odontogram-tooth-' + tooth" [class.selected]="isToothSelected(tooth)"
              role="button" tabindex="0" (click)="selectTooth(tooth)"
              (keydown.enter)="selectTooth(tooth)" (keydown.space)="selectTooth(tooth); $event.preventDefault()">
              <div class="tooth-icons-top">
                <app-odonto-icon *ngFor="let item of getToothIconsExcludingMovilidad(tooth)" [name]="item.icono" [title]="item.label"></app-odonto-icon>
              </div>
              <small class="tooth-number">{{ tooth }}</small>
              <app-tooth-faces [toothNumber]="tooth"></app-tooth-faces>
              <div class="tooth-icons">
                <app-odonto-icon *ngIf="getMovilidadIconForTooth(tooth) as m" [name]="m.icono" [title]="m.label"></app-odonto-icon>
                <app-odonto-icon *ngIf="getFurcaIconForTooth(tooth) as f" [name]="f.icono" [title]="f.label"></app-odonto-icon>
              </div>
            </div>
          </div>

          <div class="divider-line"></div>

          <div class="teeth-group">
            <div *ngFor="let tooth of permanentTeeth.topLeft" class="tooth-item" [attr.data-testid]="'odontogram-tooth-' + tooth" [class.selected]="isToothSelected(tooth)"
              role="button" tabindex="0" (click)="selectTooth(tooth)"
              (keydown.enter)="selectTooth(tooth)" (keydown.space)="selectTooth(tooth); $event.preventDefault()">
              <div class="tooth-icons-top">
                <app-odonto-icon *ngFor="let item of getToothIconsExcludingMovilidad(tooth)" [name]="item.icono" [title]="item.label"></app-odonto-icon>

              <div class="tooth-icons">
                <app-odonto-icon *ngIf="getMovilidadIconForTooth(tooth) as m" [name]="m.icono" [title]="m.label"></app-odonto-icon>
                <app-odonto-icon *ngIf="getFurcaIconForTooth(tooth) as f" [name]="f.icono" [title]="f.label"></app-odonto-icon>
              </div>
            </div>
          </div>
        </div>
      </section>

    <div class="legend-container mt-4 pt-4 border-top" data-testid="odontogram-bottom-legend">
      <!-- <p class="fw-semibold mb-3">Leyenda de Estados:</p> -->
      <div class="row g-3 justify-content-center">
