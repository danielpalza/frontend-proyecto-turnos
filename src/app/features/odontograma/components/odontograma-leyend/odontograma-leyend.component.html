<div class="card shadow-sm mb-3 legend-panel-card" data-testid="odontogram-legend-panel">
  <button
    type="button"
    class="legend-toggle-btn"
    [class.open]="legendOpen"
    id="leyenda-dropdown"
    (click)="legendOpen = !legendOpen"
    data-testid="odontogram-legend-toggle-btn"
    [attr.aria-expanded]="legendOpen"
    aria-controls="leyenda-dropdown-panel"
  >
    <span><i class="bi bi-list-check me-2"></i>Leyenda</span>
    <i class="bi bi-chevron-down chevron"></i>
  </button>

  <div id="leyenda-dropdown-panel" class="legend-panel-body" [class.open]="legendOpen">
    <div class="legend-hint" *ngIf="!selectedTooth">
      Seleccioná un diente en el odontograma para habilitar estos controles.
    </div>

    <p class="legend-group-title">Estados</p>
    <div class="legend-group">
      <label *ngFor="let estado of estados; let idx = index" class="legend-check-row">
        <input
          type="checkbox"
          [id]="'estado-' + idx"
          [disabled]="!selectedTooth"
          [checked]="isItemSelected(estado.label)"
          (change)="onToggleEstado(estado, $event)"
          [attr.data-testid]="'odontogram-estado-checkbox-' + idx"
        />
        <span>{{ estado.label || ' ' }}</span>
        <i [ngClass]="estado.icono"></i>
      </label>
    </div>

    <p class="legend-group-title">Condiciones</p>
    <div class="legend-group">
      <label *ngFor="let condicion of condiciones; let idx = index" class="legend-check-row">
        <input
          type="checkbox"
          [id]="'condicion-' + idx"
          [disabled]="!selectedTooth"
          [checked]="isItemSelected(condicion.label)"
          (change)="onToggleCondicion(condicion, $event)"
          [attr.data-testid]="'odontogram-condicion-checkbox-' + idx"
        />
        <span>{{ condicion.label }}</span>
        <i [ngClass]="condicion.icono"></i>
      </label>
    </div>

    <label class="legend-select-label" for="movilidad-select">Movilidad</label>
    <select
      id="movilidad-select"
      class="legend-select"
      [disabled]="!selectedTooth"
      [value]="getSelectedMovilidadLabel()"
      (change)="onMovilidadChange($event)"
      data-testid="odontogram-mobility-select"
    >
      <option value="">Seleccionar movilidad</option>
      <option *ngFor="let opcion of movilidadOpciones" [value]="opcion.label">
        {{ opcion.label }}
      </option>
    </select>

    <label class="legend-select-label" for="furca-select">Furca</label>
    <select
      id="furca-select"
      class="legend-select"
      [disabled]="!selectedTooth"
      [value]="getSelectedFurcaLabel()"
      (change)="onFurcaChange($event)"
      data-testid="odontogram-furcation-select"
    >
      <option value="">Seleccionar furca</option>
      <option *ngFor="let opcion of furcaOpciones" [value]="opcion.label">
        {{ opcion.label }}
      </option>
    </select>
  </div>
</div>
