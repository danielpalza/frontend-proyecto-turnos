<div class="odontograma-actions" data-testid="odontogram-actions-panel">
  <button
    class="btn btn-action btn-print"
    (click)="handlePrint()"
    data-testid="odontogram-print-btn"
  >
    <i class="bi bi-printer me-2"></i>
    <span>Imprimir</span>
  </button>

  <button
    class="btn btn-action btn-save"
    (click)="openSaveDialog()"
    [attr.data-testid]="activeForm === 'periodontograma' ? 'periodontogram-save-btn' : 'odontogram-save-btn'"
  >
    <i class="bi bi-floppy me-2"></i>
    <span>{{ saveLabel }}</span>
  </button>
</div>

<app-save-odontograma-dialog
  *ngIf="showSaveDialog"
  [open]="showSaveDialog"
  (openChange)="onDialogChange($event)"
></app-save-odontograma-dialog>
