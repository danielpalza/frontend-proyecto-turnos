<div class="turnos-view" data-testid="turnos-page">
  <!-- Mensaje de error general -->
  @if (hasError && errorMessage) {
  <div class="alert alert-danger alert-dismissible fade show" role="alert" data-testid="turnos-error">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <strong>Error:</strong> {{ errorMessage }}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"
      (click)="hasError = false; errorMessage = null"></button>
  </div>
  }

  <!-- Indicadores de carga -->
  @if (isLoadingAppointments || isLoadingPatients || isLoadingProfesionales) {
  <div class="alert alert-info" role="alert" data-testid="turnos-loading">
    <div class="spinner-border spinner-border-sm me-2" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <span>Cargando datos...</span>
  </div>
  }

  <div class="main-layout">
    <!-- Calendario -->
    <div class="calendar-section" data-testid="turnos-calendar-section">
      <app-month-calendar
        [currentDate]="currentDate"
        [selectedDate]="selectedDate"
        [appointments]="appointments"
        [profesionales]="activeProfesionales"
        [patients]="existingPatients"
        [pendingOnly]="pendingOnlyFilter"
        [pendientesOnly]="pendientesOnlyFilter"
        [canceladosOnly]="canceladosOnlyFilter"
        (dateClick)="onDateClick($event)"
        (monthChange)="onMonthChange($event)"
        (filterChange)="onFilterChange($event)"
        (pendingOnlyChange)="onPendingOnlyChange($event)"
        (pendientesOnlyChange)="onPendientesOnlyChange($event)"
        (canceladosOnlyChange)="onCanceladosOnlyChange($event)"
      />
    </div>

    <!-- Panel de turnos -->
    <div class="panel-section" data-testid="turnos-panel-section">
      <app-appointments-panel [date]="selectedDate"
        [appointments]="selectedDate ? getAppointmentsForDate(selectedDate) : []"
        [profesionales]="activeProfesionales"
        [patients]="existingPatients"
        (delete)="onDeleteAppointment($event)"
        (addClick)="onAddAppointmentClick()" />
    </div>
  </div>

  <!-- Dialogo -->
  @if (selectedDate) {
  <app-appointment-dialog [open]="isDialogOpen" [selectedDate]="selectedDate" [existingPatients]="existingPatients"
    [profesionales]="assignableProfesionales" [isLoading]="isLoading" (openChange)="onDialogOpenChange($event)"
    (submitForm)="onCreateAppointment($event)" />
  }

  <!-- Modal confirmación eliminación -->
  <app-confirm-dialog [open]="isDeleteConfirmOpen" title="Cancelar turno"
    message="¿Está seguro de que desea Cancelar este turno? Esta acción no se puede deshacer."
    [summary]="deleteCandidateSummary" [isLoading]="isDeletingAppointment" confirmText="Cancelar" cancelText="Cancelar"
    confirmButtonClass="btn-danger" dialogId="confirmDelete" (confirm)="confirmDeleteAppointment()"
    (cancel)="closeDeleteConfirm()" (openChange)="onDeleteConfirmOpenChange($event)" />
</div>
