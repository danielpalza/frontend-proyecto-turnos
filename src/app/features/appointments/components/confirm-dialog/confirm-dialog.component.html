@if (open) {
<div class="confirm-modal-backdrop" (click)="onBackdropClick()">
  <div
    class="confirm-modal"
    [class.confirm-modal--danger]="isDangerVariant"
    [class.confirm-modal--primary]="isPrimaryVariant"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="dialogId + 'Title'"
    (click)="$event.stopPropagation()"
    data-testid="confirm-dialog"
  >
    <header class="confirm-modal-header">
      <div class="confirm-modal-title-wrap">
        <div class="confirm-modal-icon" aria-hidden="true">
          <i class="bi" [ngClass]="headerIcon"></i>
        </div>
        <h5 [id]="dialogId + 'Title'" class="confirm-modal-title" data-testid="confirm-dialog-title">
          {{ title }}
        </h5>
      </div>

      <button
        type="button"
        class="btn btn-modal-close"
        aria-label="Cerrar"
        (click)="onCloseClick()"
        [disabled]="isLoading"
        data-testid="confirm-dialog-close-btn"
      >
        <i class="bi bi-x-lg"></i>
      </button>
    </header>

    <div class="confirm-modal-body">
      <p class="confirm-modal-message">{{ message }}</p>

      @if (summary) {
      <div class="confirm-modal-detail" data-testid="confirm-dialog-detail">
        <span class="confirm-modal-detail-label">Detalle</span>
        <strong>{{ summary }}</strong>
      </div>
      }
    </div>

    <footer class="confirm-modal-actions">
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="onCancelClick()"
        [disabled]="isLoading"
        data-testid="confirm-dialog-cancel-btn"
      >
        {{ cancelText }}
      </button>

      <button
        type="button"
        [class]="'btn ' + confirmButtonClass"
        (click)="onConfirmClick()"
        [disabled]="isLoading"
        data-testid="confirm-dialog-confirm-btn"
      >
        @if (isLoading) {
        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        } @else if (isDangerVariant) {
        <i class="bi bi-trash" aria-hidden="true"></i>
        }
        {{ confirmText }}
      </button>
    </footer>
  </div>
</div>
}
