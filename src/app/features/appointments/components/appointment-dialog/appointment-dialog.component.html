<div class="modal fade show d-block" *ngIf="open" appScrollLock data-testid="appointment-dialog">
  <div class="modal-backdrop fade show" (click)="close()"></div>

  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nueva Cita</h5>
        <small class="text-muted ms-2">{{ formatDisplayDate(selectedDate) }}</small>
        <button type="button" class="btn-close" (click)="close()" [disabled]="isLoading" data-testid="appointment-close-btn"></button>
      </div>

      <app-patient-wizard
        [form]="form"
        [includeAppointmentStep]="true"
        [showSearch]="true"
        [existingPatients]="existingPatients"
        [selectedPatient]="selectedPatient"
        [profesionales]="profesionales"
        [isCheckingAvailability]="isCheckingAvailability"
        [availabilityError]="availabilityError"
        [calcularResto]="calcularResto.bind(this)"
        [isSubmitting]="isLoading"
        (patientSelect)="selectPatient($event)"
        (clearPatient)="clearPatientSelection()"
        (finish)="onSubmit()"
        (cancel)="close()"
      />
    </div>
  </div>
</div>
