<div class="reset-container">
  <div class="reset-card fade-in">
    <h1 class="reset-title">OdontoLite</h1>

    @if (success) {
      <div class="reset-result">
        <div class="result-icon success">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <h2>Contraseña actualizada</h2>
        <p>{{ successMessage }}</p>
        <button class="btn btn-primary-action" (click)="goToLogin()">
          Ir a iniciar sesión
        </button>
      </div>
    } @else if (!token) {
      <div class="reset-result">
        <div class="result-icon error">
          <i class="bi bi-x-circle-fill"></i>
        </div>
        <h2>Link inválido</h2>
        <p>{{ errorMessage }}</p>
        <button class="btn btn-primary-action" (click)="goToLogin()">
          Volver al login
        </button>
      </div>
    } @else {
      <h2 class="reset-subtitle">Crear nueva contraseña</h2>
      <p class="reset-description">Ingresá tu nueva contraseña para restablecer el acceso a tu cuenta.</p>

      @if (errorMessage) {
        <div class="alert alert-danger">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          {{ errorMessage }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="reset-form">
        <div class="form-group">
          <label for="new-password" class="form-label">Nueva contraseña</label>
          <div class="input-wrapper">
            <i class="bi bi-lock input-icon"></i>
            <input
              id="new-password"
              type="password"
              class="form-control form-input"
              placeholder="Mínimo 6 caracteres"
              [(ngModel)]="newPassword"
              name="newPassword"
              [disabled]="loading"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password" class="form-label">Confirmar contraseña</label>
          <div class="input-wrapper">
            <i class="bi bi-lock-fill input-icon"></i>
            <input
              id="confirm-password"
              type="password"
              class="form-control form-input"
              placeholder="Repita la contraseña"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              [disabled]="loading"
            />
          </div>
        </div>

        <button type="submit" class="btn btn-primary-action" [disabled]="loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Restablecer contraseña
        </button>
      </form>
    }
  </div>
</div>
